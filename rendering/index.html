<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>graphics-engine</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="screen"></canvas>

  <script>
    const WIDTH = 180;
    const HEIGHT = 110;
    const FOV = 60.0;

    const SCALE = 5;
    const canvas = document.getElementById("screen");
    // const dpr = window.devicePixelRatio || 1;

    canvas.width  = WIDTH;
    canvas.height = HEIGHT;
    canvas.style.width  = WIDTH * SCALE + "px";
    canvas.style.height = HEIGHT * SCALE + "px";
    const ctx = canvas.getContext("2d");
    //ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    //ctx.imageSmoothingEnabled = false;

    //const imageData = ctx.getImageData(0,0, WIDTH, HEIGHT);
    const imageData = ctx.createImageData(WIDTH, HEIGHT);
    const buffer = imageData.data; // Uint8ClampedArray

    // Simple "cursor"
    let camera ={
        x:0,
        y:0,
        z:0,
        dist:10,
        dir:0,
        get_rad: function() {return dir / 180 * Math.PI}

    }

    let point_1 ={
        x:200,
        y:200
    }

    let point_2 ={
        x:70,
        y:10
    }

    let point_3 = {
        x:30,
        y:50
    }

    function clear() {
      buffer.fill(0)
    }

    function setPixel(x, y, r, g, b) {
      if (x < 0 || y < 0 || x >= WIDTH || y >= HEIGHT) return;
      const i = (y * WIDTH + x) * 4;
      buffer[i + 0] = r;
      buffer[i + 1] = g;
      buffer[i + 2] = b;
      buffer[i + 3] = 255;
    }


    function setCol(x_col, ystart, ystop, r, g, b) {
      ystart = Math.floor(ystart);
      ystop  = Math.floor(ystop);
      for (let y_col = ystart; y_col < ystop; y_col++){
        setPixel(x_col,y_col, r, g, b);
      }
    }

    

    function drawLine(b,e){
      let d_x = b.x-e.x
      let v = -1* Math.abs(d_x)/d_x
      let d_y = b.y-e.y
      let r = -1* Math.abs(d_y)/d_y
      if (Math.abs(d_x) >= Math.abs(d_y)){
        for(let sx = 0; sx <= Math.abs(d_x); sx++){
          let c_x = b.x + (sx * v)
          let c_y = Math.floor(b.y + (Math.abs(d_y / d_x) * sx * r))
          setPixel(c_x,c_y,200,200,200)
        }
      }else{
        for(let sy = 0; sy <= Math.abs(d_y); sy++){
          let c_y = b.y + (sy*r)
          let c_x = Math.floor(b.x + (Math.abs(d_x / d_y) * sy * v))
          setPixel(c_x,c_y,200,200,200)
        }
      }
    }

    function draw_obj(){
      drawLine(point_1,point_2)
      drawLine(point_3,point_2)
      drawLine(point_1,point_3)
    }
    



    function draw() {
      clear();
      draw_obj();
      setPixel(0,10,200,200,200)
      setPixel(60,60,200,200,200)
      ctx.putImageData(imageData, 0,0);
      requestAnimationFrame(draw);
    }

        

    // window.addEventListener("keydown", e => {
    //   m = 0
    //   if (e.key === "ArrowLeft")  rot -= 4.5;
    //   if (e.key === "ArrowRight") rot += 4.5;
    //   if (e.key === "ArrowUp")    m += 5;
    //   if (e.key === "ArrowDown")  m -= 5;
    //   x += m * Math.cos(rot_rad)
    //   z += m * Math.sin(rot_rad)
    // });

    

    draw();
  </script>
</body>
</html>

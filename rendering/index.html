<body>
  <canvas id="screen"></canvas>

  <script>
    const WIDTH = 180;
    const HEIGHT = 110;
    const FOV = 60.0;
    const VIEW_D = 500
    const SCALE = 3;
    const Znear = 5;
    const canvas = document.getElementById("screen");
    // const dpr = window.devicePixelRatio || 1;

    canvas.width  = WIDTH;
    canvas.height = HEIGHT;
    canvas.style.width  = WIDTH * SCALE + "px";
    canvas.style.height = HEIGHT * SCALE + "px";
    const ctx = canvas.getContext("2d");
    //ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    //ctx.imageSmoothingEnabled = false;

    //const imageData = ctx.getImageData(0,0, WIDTH, HEIGHT);
    const imageData = ctx.createImageData(WIDTH, HEIGHT);
    const buffer = imageData.data; // Uint8ClampedArray


    const wireframe = false
    // Simple "cursor"
    let cam ={
        m: [0,20,0],
        dist:10,
        r: [0,0,0],
        fov: Math.PI/3,
        Zfar: 1000,
        Znear: 0.1,
        get_rad: function() {return dir / 180 * Math.PI}

    }


    // const projection_matrix = [
    //   [(HEIGHT/WIDTH) * (1/Math.tan(cam.fov/2)), 0, 0, 0],
    //   [0, 1/Math.tan(cam.fov/2), 0, 0],
    //   [0, 0, cam.Zfar/(cam.Zfar-cam.Znear), 1],
    //   [0, 0, (-cam.Zfar * cam.Znear)/(cam.Zfar-cam.Znear), 0]
    // ]
    
    class Drawable {
      
    }

    class Point {
      constructor(x,y,z){
        this.x = x
        this.y = y
        this.z = z
      }
      /**
       * 
       */
      matrix(){
        return [this.x,this.y,this.z]
      }
      fill() {
        setPixel(this.x, this.y, 250,250,250)
      }
    }

    

    class Tri {
      constructor(p1,p2,p3,c){
        this.p1 = p1
        this.p2 = p2
        this.p3 = p3
        this.c = c
        this.points = [p1,p2,p3]
      }

      draw(){
        let plist = this.points.map(point => rotation_matrix(point))
        if (!isFrontFace(...plist)) return
        plist = zPlaneCLipping(plist)
        if (plist.length != 0){
          plist = plist.map(point => project(point))
          draw_tri_standard(...plist,this.c)
        }
      }
    }
    //s if side
    class Rect {
      constructor(bl, tr, c, s = false){
        this.tl = new Point(bl[0], tr[1], s == false ? tr[2] : bl[2])
        this.tr = new Point(tr[0], tr[1], tr[2])
        this.bl = new Point(bl[0], bl[1], bl[2])
        this.br = new Point(tr[0], bl[1], s == true ? tr[2] : bl[2])
        this.points = [this.bl, this.tl, this.tr, this.br]
        this.tris = [new Tri(this.bl,this.tl,this.tr, c), 
                     new Tri(this.tr,this.br,this.bl, c)]
        this.c = c
        
      }

      draw() {
        //const plist = this.points.map(point => Matrix_x_Vector(point, projection_matrix))
        
        this.tris.forEach((t) => {t.draw()})
        //plist.forEach((p) => {p.fill()})
      }
    }

    function zPlaneCLipping(plist){
      let inlist = plist.filter(p => p.z >= Znear)
      let outlist = plist.filter(p => p.z < Znear)
      if (inlist.length == 3) return plist
      if (inlist.length == 0) return []
      return []

    }
    
    class Cube {
      constructor(bl, tr){
        this.faces = [
          new Rect(bl, [tr[0],tr[1],bl[2]], 225), 
          new Rect([tr[0],bl[1],bl[2]], tr, 200, true), 
          new Rect([bl[0],bl[1],tr[2]], [bl[0],tr[1],bl[2]], 175, true),
          new Rect([bl[0],bl[1],tr[2]], [tr[0], bl[1],bl[2]], 150), 
          new Rect([tr[0],bl[1],tr[2]], [bl[0],tr[1],tr[2]], 125), 
          new Rect([bl[0],tr[1],bl[2]], tr, 120)
        ]
      }
      draw(){
        this.faces.forEach((p) => {p.draw()})
      }
    }

    const cubes = [
      new Cube([-10,0,30], [10,20,50]),  new Cube([-80,0,120], [-60,40,140])
    ]
  

    function rotation_matrix(i){

      let d = new Point(i.x-cam.m[0], i.y-cam.m[1], i.z-cam.m[2])
      let rx = -cam.r[0]
      let ry = -cam.r[1]
      let rz = -cam.r[2]
      const rot_m_1 = [
        [1, 0, 0],
        [0, Math.cos(rx), Math.sin(rx)],
        [0, -Math.sin(rx), Math.cos(rx)]
      ]
      const rot_m_2 = [
        [Math.cos(ry), 0, Math.sin(ry)],
        [0, 1, 0],
        [-Math.sin(ry), 0, Math.cos(ry)]
      ]
      const rot_m_3 = [
        [Math.cos(rz), Math.sin(rz), 0],
        [-Math.sin(rz), Math.cos(rz), 0],
        [0, 0, 1]
      ]
      d = Matrix_x_3Vector(d,rot_m_1)
      d = Matrix_x_3Vector(d,rot_m_2)
      d = Matrix_x_3Vector(d,rot_m_3)
      
      return d
    }

    function project(d){
      const f = HEIGHT / (2 * Math.tan(cam.fov / 2))
      let o = new Point(0,0,0)
      o.x = Math.round((f/d.z) * d.x + WIDTH/2)
      o.y = Math.round(-(f/d.z) * d.y + HEIGHT/2)
      
      return o
    }
    function Matrix_x_3Vector(i,m){
      let o = new Point(0,0,0)
      o.x = i.x * m[0][0] + i.y * m[0][1] + i.z * m[0][2]
      o.y = i.x * m[1][0] + i.y * m[1][1] + i.z * m[1][2]
      o.z = i.x * m[2][0] + i.y * m[2][1] + i.z * m[2][2]
      return o
    }

    // function Matrix_x_4Vector(i, m){
    //   let o = new Point(0,0,0)
    //   o.x = i.x * m[0][0] + i.y * m[1][0] + i.z * m[2][0] + m[3][0]
    //   o.y = i.x * m[0][1] + i.y * m[1][1] + i.z * m[2][1] + m[3][1]
    //   o.z = i.x * m[0][2] + i.y * m[1][2] + i.z * m[2][2] + m[3][2]
    //   let w = i.x * m[0][3] + i.y * m[1][3] + i.z * m[2][3] + m[3][3]
    //   if (w != 0){
    //     o.x /= w
    //     o.y /= w
    //     o.z /= w
    //   }
    //   o.x = Math.round(o.x)
    //   o.y = Math.round(o.y)
    //   o.z = Math.round(o.z)
    //   return o
    // }

    function cross(a, b) {
      return new Point(
        a.y * b.z - a.z * b.y,
        a.z * b.x - a.x * b.z,
        a.x * b.y - a.y * b.x
      );
    }

    function subtract(a, b) {
      return new Point(
        a.x - b.x,
        a.y - b.y,
        a.z - b.z
      );
    }

    function isFrontFace(p1, p2, p3) {
      const e1 = subtract(p1, p2);
      const e2 = subtract(p2, p3);
      const normal = cross(e1, e2);

      const to_camera = new Point(-p1.x, -p1.y, -p1.z)
      return dot(normal, to_camera) > 0
    }

    function dot(p1, p2){
      return p1.x * p2.x + p1.y * p2.y + p1.z * p2.z
    }

    function u_v(i){ 
      if (i == 0) return 0
      return (i / (Math.abs(i)))
    }
    function clear() {
      buffer.fill(0)
    }

    function setPixel(x, y, r, g, b) {
      if (x < 0 || y < 0 || x >= WIDTH || y >= HEIGHT) return;
      const i = (y * WIDTH + x) * 4;
      buffer[i + 0] = r;
      buffer[i + 1] = g;
      buffer[i + 2] = b;
      buffer[i + 3] = 255;
    }


    function setRow(x_col, ystart, ystop, r, g, b) {
      if (ystart > ystop){
        [ystart,ystop] = [ystop, ystart]
      }
      for (let y_col = ystart; y_col <= ystop; y_col++){
        setPixel(x_col,y_col, r, g, b);
      }
    }

    function setCol(y_col, xstart, xstop, r, g, b) {
      if (xstart > xstop){
        [xstart,xstop] = [xstop, xstart]
      }
      for (let x_col = xstart; x_col <= xstop; x_col++){
        setPixel(x_col,y_col, r, g, b);
      }
    }

    

    function drawLine(b,e){
      let d_x = b.x-e.x
      let v = (d_x > 0) ? -1 : 1;
      let d_y = b.y-e.y
      let r = (d_y > 0) ? -1 : 1;
      if(d_x == 0){
        setCol(b.x, Math.min(b.y, e.y), Math.max(b.y, e.y), 200,200,200)
        return
      }
      if(d_y == 0){
        setRow(b.y, Math.min(b.x, e.x), Math.max(b.x, e.x), 200,200,200)
        return
      }
      let s = Math.abs(d_y / d_x)
      if (Math.abs(d_x) >= Math.abs(d_y)){
        for(let sx = 0; sx <= Math.abs(d_x); sx++){
          let c_x = b.x + (sx * v)
          let c_y = Math.round(b.y + (s * sx * r))
          setPixel(c_x,c_y,200,200,200)
        }
      }else{
        for(let sy = 0; sy <= Math.abs(d_y); sy++){
          let c_y = b.y + (sy*r)
          let c_x = Math.round(b.x + (1/s * sy * v))
          setPixel(c_x,c_y,200,200,200)
        }
      }
    }

    function draw_obj(){
      // s_d = VIEW_D * sin(FOV)
      // bounds = Rect([cam.m[0]-s_d*Math.cos(cam.r[1]), 0, cam.m[2]+s_d*Math.sin(cam.r[1])],
      //                  [cam.m[0]+s_d*Math.cos(cam.r[1]) + VIEW_D*Math.sin(cam.r[1]), 0, cam.m[2]-s_d*Math.sin(cam.r[1]) + VIEW_D*Math.cos(cam.r[1])])
      cubes.forEach(element => {
        element.draw()
      });
    }

    function sort_by_y(point_list){
      point_list.sort((a,b) => a.y - b.y)
      return point_list
    }
    
    function fill_flat_bottom(p1,p2,p3,c) {
      const y_diff = p2.y - p1.y
      const p2_s = (p2.x - p1.x) / y_diff
      const p3_s = (p3.x - p1.x) / y_diff

      let l_2_x = p1.x
      let l_3_x = p1.x

      for(let curr_y = p1.y; curr_y <= p2.y; curr_y++){
        if (wireframe && curr_y != p2.y){
          setPixel(Math.round(l_2_x), curr_y, c,c,c)
          setPixel(Math.round(l_3_x), curr_y, c,c,c)
        }else{
          setCol(curr_y, Math.round(l_2_x), Math.round(l_3_x), c,c,c)
        }
        l_2_x += p2_s
        l_3_x += p3_s
      }
      
    }
    
    function fill_flat_top(p1,p2,p3,c) {
      const y_diff = p3.y - p1.y
      const p2_s = (p3.x - p2.x) / y_diff
      const p1_s = (p3.x - p1.x) / y_diff

      let l_2_x = p3.x
      let l_1_x = p3.x

      for(let curr_y = p3.y; curr_y >= p2.y; curr_y--){
        if (wireframe &&  curr_y != p2.y){
          setPixel(Math.round(l_2_x), curr_y, c,c,c)
          setPixel(Math.round(l_1_x), curr_y, c,c,c)
        }else{
          setCol(curr_y, Math.round(l_2_x), Math.round(l_1_x), c,c,c)
        }
        l_2_x -= p2_s
        l_1_x -= p1_s
      }
      
    }

    function draw_tri_standard(p1,p2,p3,c){
      [p1,p2,p3] = sort_by_y([p1,p2,p3])

      if (p2.y == p3.y){
        fill_flat_bottom(p1,p2,p3,c)
      }else if (p1.y == p2.y){
        fill_flat_top(p1,p2,p3,c)
      }else{
        let p4 = new Point(Math.round(p1.x + ((p2.y - p1.y)/(p3.y - p1.y)) * (p3.x - p1.x)), p2.y)
        //p4.fill()
        fill_flat_bottom(p1,p2,p4,c)
        fill_flat_top(p2,p4,p3,c)
      }

    }

    function draw() {
      clear();
      draw_obj();
      ctx.putImageData(imageData, 0,0);
      requestAnimationFrame(draw);
    }

        

    window.addEventListener("keydown", e => {
      m = 0
      sm = 0
      if (e.key === "ArrowLeft")  sm -= 3;
      if (e.key === "ArrowRight") sm += 3;
      if (e.key === "ArrowUp")    m += 3;
      if (e.key === "ArrowDown")  m -= 3;
      if (e.key === "w")  cam.r[0] += 2/180 * Math.PI;
      if (e.key === "s") cam.r[0] -= 2/180 * Math.PI;
      if (e.key === "a")    cam.r[1] -= 2/180 * Math.PI;
      if (e.key === "d")  cam.r[1] += 2/180 * Math.PI;
      if (e.key === "q")    cam.r[2] += 2/180 * Math.PI;
      if (e.key === "e")  cam.r[2] -= 2/180 * Math.PI;
      if (e.key === "i")    cam.m[1] -= 3
      if (e.key === "k")  cam.m[1] += 3
      // let rot_rad = rot * Math.PI / 180;
      cam.m[2] += m * Math.cos(cam.r[1]) * Math.cos(cam.r[0])
      cam.m[1] += m * -Math.sin(cam.r[0])
      cam.m[0] += m * Math.sin(cam.r[1]) * Math.cos(cam.r[0])

      cam.m[0] += sm * Math.cos(cam.r[1])
      cam.m[1] += sm * 0
      cam.m[2] += sm * -Math.sin(cam.r[1])



    });
    

    draw();
  </script>
